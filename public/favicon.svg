<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff69b4"/>
      <stop offset="100%" stop-color="#e91e8c"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- 3x3 cube face grid -->
  <!-- Row 1 -->
  <rect x="18" y="18" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.9"/>
  <rect x="51" y="18" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.5"/>
  <rect x="84" y="18" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.3"/>

  <!-- Row 2 -->
  <rect x="18" y="51" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.5"/>
  <rect x="51" y="51" width="26" height="26" rx="4" fill="url(#pink)" opacity="1"/>
  <rect x="84" y="51" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.5"/>

  <!-- Row 3 -->
  <rect x="18" y="84" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.3"/>
  <rect x="84" y="84" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.9"/>
  <rect x="51" y="84" width="26" height="26" rx="4" fill="url(#pink)" opacity="0.5"/>
</svg>
